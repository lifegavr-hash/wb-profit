<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a1f"/>
      <stop offset="60%" stop-color="#1e1640"/>
      <stop offset="100%" stop-color="#0f0a1f"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#7c3aed" opacity="0.08"/>
  <circle cx="1100" cy="530" r="180" fill="#a78bfa" opacity="0.10"/>

  <!-- logo mark (W) -->
  <g transform="translate(80, 80)" filter="url(#glow)">
    <rect width="100" height="100" rx="22" fill="url(#purple)"/>
    <path d="M22 25h11l8 38 8-38h9l8 38 8-38h11l-13 50h-11l-8-35-8 35h-11z" fill="#fff"/>
  </g>

  <!-- title -->
  <text x="80" y="320" font-family="-apple-system, Inter, Arial, sans-serif" font-weight="800" font-size="96" fill="#fff">WB Profit</text>
  <text x="80" y="395" font-family="-apple-system, Inter, Arial, sans-serif" font-weight="400" font-size="40" fill="#a78bfa">Реальная прибыль вашего магазина на Wildberries</text>

  <!-- features row -->
  <g transform="translate(80, 470)">
    <g>
      <circle cx="14" cy="14" r="14" fill="#22c55e"/>
      <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="40" y="22" font-family="-apple-system, Inter, Arial, sans-serif" font-size="26" fill="#e5e7eb">Себестоимость · Логистика · Реклама · ДРР</text>
  </g>
  <g transform="translate(80, 520)">
    <g>
      <circle cx="14" cy="14" r="14" fill="#22c55e"/>
      <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="40" y="22" font-family="-apple-system, Inter, Arial, sans-serif" font-size="26" fill="#e5e7eb">Алерты о потерях · Кассовый разрыв · Возвраты</text>
  </g>
  <g transform="translate(80, 570)">
    <g>
      <circle cx="14" cy="14" r="14" fill="#22c55e"/>
      <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="40" y="22" font-family="-apple-system, Inter, Arial, sans-serif" font-size="26" fill="#e5e7eb">Демо без регистрации · Подключение за 30 секунд</text>
  </g>

  <!-- url badge -->
  <g transform="translate(880, 540)">
    <rect width="240" height="60" rx="30" fill="url(#purple)"/>
    <text x="120" y="38" text-anchor="middle" font-family="-apple-system, Inter, Arial, sans-serif" font-weight="700" font-size="22" fill="#fff">wb-profit.app</text>
  </g>
</svg>
