<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a1f"/>
      <stop offset="60%" stop-color="#1e1640"/>
      <stop offset="100%" stop-color="#0f0a1f"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="growthLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- фон -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- декоративные размытые круги -->
  <circle cx="120" cy="120" r="220" fill="#7c3aed" opacity="0.10"/>
  <circle cx="1080" cy="510" r="200" fill="#a78bfa" opacity="0.12"/>
  <circle cx="900" cy="100" r="80" fill="#a78bfa" opacity="0.08"/>

  <!-- логотип SW в круге -->
  <g transform="translate(80, 80)" filter="url(#glow)">
    <circle cx="50" cy="50" r="50" fill="url(#purple)"/>
    <text x="50" y="68" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif"
          font-size="48" font-weight="800" fill="#ffffff" text-anchor="middle"
          letter-spacing="-2">SW</text>
  </g>

  <!-- название бренда -->
  <text x="200" y="135" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif"
        font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-0.5">SW Profit</text>

  <!-- основной заголовок -->
  <text x="80" y="290" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif"
        font-size="86" font-weight="800" fill="#ffffff" letter-spacing="-3">Seller's Way</text>
  <text x="80" y="385" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif"
        font-size="86" font-weight="800" fill="url(#purple)" letter-spacing="-3">to Profit</text>

  <!-- подзаголовок -->
  <text x="80" y="455" font-family="-apple-system, system-ui, sans-serif"
        font-size="28" font-weight="400" fill="#a78bfa" letter-spacing="0">
    Аналитика чистой прибыли для продавцов маркетплейсов
  </text>

  <!-- стрелка роста (правый нижний угол) -->
  <g transform="translate(800, 360)" filter="url(#glow)">
    <polyline points="0,180 60,140 110,170 170,90 220,110 280,30"
              fill="none" stroke="url(#growthLine)" stroke-width="6"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- точки на графике -->
    <circle cx="0" cy="180" r="7" fill="#7c3aed"/>
    <circle cx="60" cy="140" r="7" fill="#8b5cf6"/>
    <circle cx="110" cy="170" r="7" fill="#8b5cf6"/>
    <circle cx="170" cy="90" r="7" fill="#a78bfa"/>
    <circle cx="220" cy="110" r="7" fill="#a78bfa"/>
    <circle cx="280" cy="30" r="10" fill="#ffffff"/>
    <!-- стрелка вверх в конце -->
    <polyline points="265,45 280,30 295,45" fill="none" stroke="#ffffff" stroke-width="5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- футер: бейджи фич -->
  <g transform="translate(80, 530)">
    <rect width="200" height="50" rx="25" fill="#7c3aed" opacity="0.2"/>
    <text x="100" y="32" font-family="-apple-system, system-ui, sans-serif" font-size="18"
          fill="#a78bfa" text-anchor="middle" font-weight="600">💰 Реальная прибыль</text>

    <rect x="220" width="200" height="50" rx="25" fill="#7c3aed" opacity="0.2"/>
    <text x="320" y="32" font-family="-apple-system, system-ui, sans-serif" font-size="18"
          fill="#a78bfa" text-anchor="middle" font-weight="600">📊 Все маркетплейсы</text>

    <rect x="440" width="180" height="50" rx="25" fill="#7c3aed" opacity="0.2"/>
    <text x="530" y="32" font-family="-apple-system, system-ui, sans-serif" font-size="18"
          fill="#a78bfa" text-anchor="middle" font-weight="600">⚡ 2 минуты</text>
  </g>
</svg>
