<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>WB Profit</title>
<style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f7f7f5;color:#6b6b68}</style>

<body>
<p>Загружаем...</p>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
async function check(){
  var r=await fetch('/api/config');
  var cfg=await r.json();
  var sb=supabase.createClient(cfg.supabaseUrl,cfg.supabaseKey);
  var {data:{session}}=await sb.auth.getSession();
  window.location.href=session?'/dashboard.html':'/login.html';
}
check();
</script>
</body>
</html>
