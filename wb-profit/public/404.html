<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена · WB Profit</title>
<meta name="description" content="Запрашиваемая страница не существует или была перемещена.">
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#7c3aed">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:#0f0a1f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.box{max-width:560px;text-align:center;padding:2rem}
.code{font-size:140px;font-weight:800;line-height:1;letter-spacing:-.05em;background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
.title{font-size:28px;font-weight:700;margin-bottom:.75rem;color:#fff}
.desc{font-size:16px;color:#94a3b8;margin-bottom:2rem;line-height:1.6}
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-block;padding:12px 24px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:500;transition:all .15s;border:none;cursor:pointer}
.btn-primary{background:#7c3aed;color:#fff}
.btn-primary:hover{background:#6d28d9}
.btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-ghost:hover{background:rgba(255,255,255,.06)}
.links{margin-top:2rem;font-size:13px;color:#64748b}
.links a{color:#a78bfa;text-decoration:none;margin:0 8px}
.links a:hover{text-decoration:underline}
@media(max-width:480px){.code{font-size:96px}.title{font-size:22px}.desc{font-size:14px}}
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <h1 class="title">Страница не найдена</h1>
  <p class="desc">Возможно, ссылка устарела или адрес введён с опечаткой. Вернитесь на главную или загляните в кабинет.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">На главную</a>
    <a href="/dashboard.html" class="btn btn-ghost">В кабинет</a>
  </div>
  <div class="links">
    <a href="/demo">Демо</a> ·
    <a href="/login.html">Вход</a> ·
    <a href="/offer.html">Оферта</a> ·
    <a href="/privacy.html">Политика ПД</a>
  </div>
</div>
</body>
</html>
