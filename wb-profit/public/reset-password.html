<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB Profit — Новый пароль</title>
<meta name="description" content="Установка нового пароля в WB Profit.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#7c3aed">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#5433c6;--purple-light:#EEEDFE;--bg:#f7f7f5;--surface:#fff;--border:rgba(0,0,0,.1);--text:#1a1a18;--muted:#6b6b68;--hint:#a0a09c;--red:#c0392b;--red-bg:#fdf0ef;--green:#1a7a4a;--r:12px;--rs:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:1.5rem}
.logo-name{font-size:22px;font-weight:600;color:var(--purple)}
.logo-sub{font-size:13px;color:var(--muted);margin-top:3px}
h1{font-size:18px;font-weight:600;margin-bottom:1.25rem;color:var(--text)}
.field{margin-bottom:1rem}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border .15s}
input:focus{border-color:var(--purple)}
.btn{display:block;width:100%;padding:11px;background:var(--purple);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:500;cursor:pointer;margin-top:1.25rem}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{background:var(--red-bg);border:1px solid #f5c6c2;border-radius:var(--rs);padding:.75rem 1rem;font-size:13px;color:var(--red);margin-top:1rem;display:none}
.ok{background:#EAF3DE;border:1px solid #C0DD97;border-radius:var(--rs);padding:.75rem 1rem;font-size:13px;color:var(--green);margin-top:1rem;display:none}
.hint{font-size:12px;color:var(--hint);margin-top:1rem;text-align:center}
.hint a{color:var(--purple);text-decoration:none;font-weight:500}
.loading{text-align:center;padding:2rem;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-name">WB Profit</div>
    <div class="logo-sub">Установка нового пароля</div>
  </div>

  <div id="loadingState" class="loading">Проверяем ссылку...</div>

  <div id="formState" style="display:none">
    <h1>Придумайте новый пароль</h1>
    <div class="field"><label>Новый пароль</label><input type="password" id="newPass" placeholder="Минимум 6 символов" autocomplete="new-password"></div>
    <div class="field"><label>Повторите пароль</label><input type="password" id="newPass2" placeholder="Введите ещё раз" autocomplete="new-password"></div>
    <button class="btn" id="saveBtn" onclick="savePassword()">Сохранить новый пароль</button>
    <div class="err" id="errBox"></div>
    <div class="ok" id="okBox"></div>
  </div>

  <div id="errorState" style="display:none">
    <h1 style="color:var(--red)">Ссылка недействительна</h1>
    <p style="font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:1rem">Ссылка для восстановления пароля просрочена или была использована. Запросите новое письмо.</p>
    <a href="/login.html" class="btn" style="text-decoration:none;text-align:center;display:block">Вернуться на вход</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var sb = null;
var ready = false;

async function initSupabase() {
  var r = await fetch('/api/config');
  var cfg = await r.json();
  sb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseKey, {
    auth: { detectSessionInUrl: true, persistSession: false }
  });
  // Supabase Auth кладёт recovery-токен в URL hash и автоматически разбирает его.
  // Слушаем событие PASSWORD_RECOVERY чтобы показать форму.
  sb.auth.onAuthStateChange(function(event, session){
    if(event === 'PASSWORD_RECOVERY'){
      ready = true;
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('formState').style.display = 'block';
    }
  });
  // Fallback: если через 3 секунды нет recovery — ссылка невалидна
  setTimeout(function(){
    if(!ready){
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
  }, 3000);
}
initSupabase();

async function savePassword(){
  var p1 = document.getElementById('newPass').value;
  var p2 = document.getElementById('newPass2').value;
  var err = document.getElementById('errBox');
  var ok = document.getElementById('okBox');
  var btn = document.getElementById('saveBtn');
  err.style.display='none'; ok.style.display='none';
  if(!p1 || p1.length<6){err.textContent='Пароль минимум 6 символов'; err.style.display='block'; return;}
  if(p1 !== p2){err.textContent='Пароли не совпадают'; err.style.display='block'; return;}
  btn.disabled=true; btn.textContent='Сохраняем...';
  var res = await sb.auth.updateUser({ password: p1 });
  if(res.error){
    err.textContent = res.error.message;
    err.style.display='block';
    btn.disabled=false; btn.textContent='Сохранить новый пароль';
    return;
  }
  ok.innerHTML = 'Пароль обновлён! Перенаправляем на вход...';
  ok.style.display='block';
  btn.style.display='none';
  // Подождём 2 сек, потом logout + редирект на login
  setTimeout(async function(){
    await sb.auth.signOut();
    window.location.href = '/login.html';
  }, 2000);
}

document.getElementById('newPass2').addEventListener('keydown', function(e){if(e.key==='Enter') savePassword();});
</script>
</body>
</html>
