<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><title>SW Profit — Настройки</title>
<style>body{margin:0;padding:24px;font-family:-apple-system,sans-serif;max-width:560px;font-size:14px}
h1{font-size:20px;margin:0 0 4px;color:#5b3aff}.ver{color:#888;font-size:12px;margin-bottom:24px}
.section{background:#f7f7f9;border-radius:10px;padding:16px;margin-bottom:16px}
h2{font-size:14px;margin:0 0 12px}.field{margin-bottom:14px}
label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:600}
input,select{width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px;box-sizing:border-box}
.hint{font-size:11px;color:#888;margin-top:4px}
button{background:#5b3aff;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.saved{margin-left:12px;color:#2e7d32;opacity:0;transition:opacity .3s}.saved.show{opacity:1}</style></head><body>
<h1>📊 SW Profit — Настройки</h1><div class="ver">Версия <span id="ver">?</span></div>
<div class="section"><h2>Модель</h2>
<div class="field"><label>Модель по умолчанию</label>
<select id="model"><option value="fbo">FBO/FBW</option><option value="fbs">FBS</option><option value="dbs">DBS</option></select></div></div>
<div class="section"><h2>Финансы</h2>
<div class="field"><label>Налог, %</label><input type="number" id="tax_pct" min="0" max="50" step="0.1"></div>
<div class="field"><label>Эквайринг, %</label><input type="number" id="acquiring_pct" min="0" max="5" step="0.1"></div>
<div class="field"><label>Выкуп, %</label><input type="number" id="redemption_pct" min="0" max="100" step="1"></div>
<div class="field"><label>Реклама, %</label><input type="number" id="ad_pct" min="0" max="50" step="0.5"></div></div>
<button id="save">💾 Сохранить</button><span id="saved" class="saved">✓</span>
<script src="options.js"></script></body></html>
